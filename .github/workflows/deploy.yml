name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Upload files & deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          deploy_files() {
            FILES_JSON="["
            FIRST=true
            for f in index.html listings-db.json listing-photos.json; do
              [ -f "$f" ] || continue
              SHA=$(sha1sum "$f" | awk '{print $1}')
              curl -s -X POST https://api.vercel.com/v2/files \
                -H "Authorization: Bearer $VERCEL_TOKEN" \
                -H "Content-Type: application/octet-stream" \
                -H "x-vercel-digest: $SHA" \
                --data-binary @"$f" > /dev/null
              $FIRST || FILES_JSON+=","
              FILES_JSON+="{\"file\":\"$f\",\"sha\":\"$SHA\"}"
              FIRST=false
            done
            FILES_JSON+="]"
            echo $FILES_JSON
          }

          FILES=$(deploy_files)

          curl -s -X POST https://api.vercel.com/v13/deployments \
            -H "Authorization: Bearer $VERCEL_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"name\": \"london-flats\",
              \"project\": \"$VERCEL_PROJECT_ID\",
              \"target\": \"production\",
              \"files\": $FILES,
              \"projectSettings\": {\"framework\": null}
            }" | python3 -c "import sys,json; d=json.load(sys.stdin); print('Deployed:', d.get('url','unknown'))"

  deploy-railway:
    name: Notify Railway
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway redeploy
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          curl -s -X POST https://backboard.railway.app/graphql/v2 \
            -H "Authorization: Bearer $RAILWAY_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"query":"mutation { serviceInstanceDeploy(serviceId: \"18e6e364-cc77-4abc-9118-a08f3253ddb6\", environmentId: \"production\") }"}' \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('Railway:', d)"
